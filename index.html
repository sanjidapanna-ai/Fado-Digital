<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Fado Digital — Premium Digital Agency in Lisbon, Portugal.">
<title>Fado Digital — Lisbon Digital Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0D1B2A;--navy-mid:#1A2E42;--navy-light:#243B55;
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-pale:#F5E6C0;
  --cream:#F8F4EE;--cream-dark:#EDE8DF;
  --text:#1A1A2E;--text-soft:#5A6478;--text-muted:#8A93A6;
  --success:#2ECC71;--error:#E74C3C;
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;}
button{cursor:pointer;font-family:'DM Sans',sans-serif;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
.cookie{position:fixed;bottom:0;left:0;right:0;background:var(--navy);color:white;padding:16px 5%;display:flex;align-items:center;justify-content:space-between;gap:20px;z-index:800;border-top:2px solid var(--gold);flex-wrap:wrap;}
.cookie-text{font-size:13px;color:rgba(255,255,255,.7);max-width:600px;line-height:1.6;}
.cookie-btns{display:flex;gap:10px;}
.btn-accept{background:var(--gold);color:var(--navy);border:none;padding:9px 20px;border-radius:4px;font-size:13px;font-weight:600;}
.btn-decline{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);padding:9px 20px;border-radius:4px;font-size:13px;}
.nav{position:fixed;top:0;left:0;right:0;z-index:400;padding:0 5%;height:70px;display:flex;align-items:center;justify-content:space-between;transition:all .4s;}
.nav.scrolled{background:rgba(13,27,42,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,.15);}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:38px;height:38px;border:1.5px solid var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:18px;color:var(--gold);font-style:italic;}
.logo-name{font-family:'Fraunces',serif;font-size:18px;color:white;font-weight:600;display:block;line-height:1;}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;display:block;margin-top:2px;}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:white;}
.nav-right{display:flex;align-items:center;gap:14px;}
.lang-toggle{display:flex;gap:3px;background:rgba(255,255,255,.08);border-radius:4px;padding:3px;}
.lang-btn{background:transparent;border:none;color:rgba(255,255,255,.45);padding:4px 10px;border-radius:3px;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;}
.lang-btn.active{background:var(--gold);color:var(--navy);}
.btn-nav-cta{background:var(--gold);color:var(--navy);border:none;padding:10px 20px;border-radius:3px;font-size:13px;font-weight:600;transition:all .2s;}
.btn-nav-cta:hover{background:var(--gold-light);}
.hero{height:100vh;position:relative;overflow:hidden;display:flex;align-items:center;}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;}
.hero-slide.active{opacity:1;}
.hero-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:180px;opacity:.06;}
.s1{background:linear-gradient(135deg,#0D1B2A,#1A2E42);}
.s2{background:linear-gradient(135deg,#1A2E42,#1B4F8A);}
.s3{background:linear-gradient(135deg,#0D1B2A,#2d1a0e);}
.s4{background:linear-gradient(135deg,#1a2e42,#1a3a1a);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(13,27,42,.88) 45%,transparent);}
.hero-content{position:relative;z-index:1;padding:0 8%;max-width:700px;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(201,168,76,.35);color:var(--gold);padding:6px 14px;border-radius:2px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.hero-title{font-family:'Fraunces',serif;font-size:clamp(38px,6vw,76px);color:white;line-height:1.05;font-weight:300;margin-bottom:20px;}
.hero-title em{font-style:italic;color:var(--gold);}
.hero-sub{font-size:clamp(14px,1.5vw,17px);color:rgba(255,255,255,.6);line-height:1.8;max-width:480px;margin-bottom:40px;}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;}
.btn-hp{background:var(--gold);color:var(--navy);border:none;padding:15px 34px;font-size:14px;font-weight:600;border-radius:3px;transition:all .3s;}
.btn-hp:hover{background:var(--gold-light);}
.btn-hg{background:transparent;color:white;border:1px solid rgba(255,255,255,.3);padding:15px 30px;font-size:14px;border-radius:3px;transition:all .3s;}
.btn-hg:hover{border-color:var(--gold);color:var(--gold);}
.slide-dots{position:absolute;bottom:40px;left:8%;display:flex;gap:8px;z-index:2;}
.sdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;transition:all .3s;}
.sdot.active{background:var(--gold);width:20px;border-radius:3px;}
.hero-scroll{position:absolute;bottom:40px;right:8%;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;z-index:2;}
.scroll-line{width:1px;height:44px;background:linear-gradient(to bottom,var(--gold),transparent);animation:sc 2s ease infinite;}
@keyframes sc{0%,100%{opacity:.3;}50%{opacity:1;}}
.scroll-label{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;}
.ticker{background:var(--gold);padding:10px 0;overflow:hidden;}
.ticker-inner{display:flex;gap:48px;white-space:nowrap;animation:tick 22s linear infinite;}
.tick-item{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--navy);display:flex;align-items:center;gap:16px;}
.tick-item::after{content:'◆';opacity:.4;}
@keyframes tick{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.section{padding:90px 8%;}
.dark{background:var(--navy);}
.sec-eye{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec-eye::before{content:'';width:24px;height:1px;background:var(--gold);}
.sec-title{font-family:'Fraunces',serif;font-size:clamp(30px,4vw,52px);line-height:1.1;font-weight:300;margin-bottom:14px;}
.sec-title em{font-style:italic;color:var(--gold);}
.sec-desc{font-size:15px;color:var(--text-soft);line-height:1.8;max-width:560px;}
.dark .sec-title{color:white;}
.dark .sec-desc{color:rgba(255,255,255,.5);}
.srv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:56px;}
.srv-card{background:white;padding:40px 32px;position:relative;overflow:hidden;transition:all .3s;border:1px solid rgba(0,0,0,.05);}
.srv-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transition:transform .3s;}
.srv-card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(13,27,42,.1);}
.srv-card:hover::after{transform:scaleX(1);}
.srv-icon{font-size:34px;margin-bottom:18px;display:block;}
.srv-num{position:absolute;top:22px;right:24px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);}
.srv-title{font-family:'Fraunces',serif;font-size:20px;color:var(--navy);margin-bottom:10px;font-weight:600;}
.srv-desc{font-size:13px;color:var(--text-soft);line-height:1.7;}
.srv-link{display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:12px;font-weight:600;color:var(--gold);letter-spacing:.3px;cursor:pointer;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);}
.stat-bl{padding:40px 28px;border-right:1px solid rgba(255,255,255,.08);text-align:center;}
.stat-bl:last-child{border-right:none;}
.stat-n{font-family:'Fraunces',serif;font-size:48px;color:var(--gold);font-weight:300;line-height:1;}
.stat-s{font-size:26px;color:var(--gold-light);}
.stat-l{font-size:12px;color:rgba(255,255,255,.4);margin-top:6px;}
.gal-section{padding:90px 0;background:var(--cream-dark);}
.gal-header{padding:0 8%;margin-bottom:40px;}
.gal-filters{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;}
.f-btn{background:transparent;border:1px solid rgba(13,27,42,.15);color:var(--text-soft);padding:7px 18px;border-radius:2px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;}
.f-btn:hover,.f-btn.on{background:var(--navy);color:white;border-color:var(--navy);}
.gal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:0 8%;}
.gal-item{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:48px;opacity:.25;transition:all .4s;}
.gal-item:nth-child(1){grid-column:span 2;grid-row:span 2;font-size:72px;}
.gal-item:nth-child(5){grid-column:span 2;}
.gal-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,27,42,.9),transparent 60%);opacity:0;transition:opacity .4s;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;}
.gal-item:hover .gal-overlay{opacity:1;}
.gal-item:hover{opacity:.35;}
.gal-item-title{font-family:'Fraunces',serif;font-size:15px;color:white;margin-bottom:3px;}
.gal-item-cat{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px;}
.lb-inner{max-width:860px;width:100%;position:relative;}
.lb-img{width:100%;aspect-ratio:16/9;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:90px;opacity:.3;}
.lb-x{position:absolute;top:-44px;right:0;background:none;border:1px solid rgba(255,255,255,.2);color:white;width:34px;height:34px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-cap{margin-top:14px;text-align:center;}
.lb-cap-title{font-family:'Fraunces',serif;font-size:18px;color:white;margin-bottom:3px;}
.lb-cap-cat{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.lb-nav{display:flex;justify-content:center;gap:10px;margin-top:16px;}
.lb-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:white;padding:9px 22px;border-radius:3px;font-size:13px;cursor:pointer;transition:all .2s;}
.lb-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.vid-wrap{margin-top:50px;border-radius:8px;overflow:hidden;max-width:880px;margin-left:auto;margin-right:auto;}
.vid-thumb{aspect-ratio:16/9;background:var(--navy-mid);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;}
.vid-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:140px;opacity:.07;}
.vid-ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(13,27,42,.6),rgba(27,79,138,.35));}
.play-c{width:76px;height:76px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;transition:all .3s;}
.play-c::before{content:'';position:absolute;inset:-8px;border:1px solid rgba(201,168,76,.3);border-radius:50%;animation:vp 2s ease infinite;}
@keyframes vp{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.2);opacity:0;}}
.play-icon{font-size:26px;margin-left:4px;color:var(--gold);}
.vid-thumb:hover .play-c{background:var(--gold);}
.vid-thumb:hover .play-icon{color:var(--navy);}
.vid-label{position:absolute;bottom:22px;left:22px;z-index:1;}
.vid-label-title{font-family:'Fraunces',serif;font-size:18px;color:white;margin-bottom:3px;}
.vid-label-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;}
.vid-frame{aspect-ratio:16/9;width:100%;}
.vid-frame iframe{width:100%;height:100%;border:none;}
.t-wrap{overflow:hidden;margin-top:52px;}
.t-track{display:flex;gap:20px;transition:transform .6s ease;}
.t-card{background:white;border-radius:4px;padding:36px;min-width:360px;flex-shrink:0;border-left:3px solid var(--gold);box-shadow:0 4px 20px rgba(13,27,42,.06);}
.t-stars{display:flex;gap:3px;margin-bottom:16px;}
.t-star{color:var(--gold);font-size:13px;}
.t-quote{font-family:'Fraunces',serif;font-size:17px;color:var(--navy);line-height:1.6;font-style:italic;margin-bottom:20px;font-weight:300;}
.t-auth{display:flex;align-items:center;gap:12px;}
.t-av{width:44px;height:44px;border-radius:50%;background:var(--navy-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.t-name{font-weight:600;color:var(--navy);font-size:13px;margin-bottom:2px;}
.t-co{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.t-controls{display:flex;align-items:center;gap:14px;margin-top:28px;}
.t-arr{width:42px;height:42px;border:1px solid rgba(13,27,42,.15);border-radius:50%;background:transparent;color:var(--navy);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.t-arr:hover{background:var(--navy);color:white;}
.t-dots{display:flex;gap:5px;align-items:center;}
.t-dot{width:6px;height:6px;border-radius:50%;background:rgba(13,27,42,.15);transition:all .3s;}
.t-dot.on{background:var(--gold);width:16px;border-radius:3px;}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:52px;}
.faq-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);overflow:hidden;}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:22px 26px;cursor:pointer;gap:14px;transition:background .2s;}
.faq-q:hover{background:rgba(255,255,255,.04);}
.faq-qt{font-size:14px;color:white;font-weight:400;line-height:1.4;}
.faq-tog{width:26px;height:26px;border:1px solid rgba(201,168,76,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold);font-size:15px;transition:all .3s;}
.faq-tog.on{background:var(--gold);color:var(--navy);transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;font-size:13px;color:rgba(255,255,255,.5);line-height:1.8;}
.faq-a.on{max-height:200px;padding:0 26px 22px;}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:52px;}
.news-card{background:white;border-radius:4px;overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s;}
.news-card:hover{transform:translateY(-5px);box-shadow:0 18px 44px rgba(13,27,42,.1);}
.news-img{height:190px;display:flex;align-items:center;justify-content:center;font-size:52px;opacity:.25;position:relative;}
.ni1{background:linear-gradient(135deg,#0D1B2A,#1B4F8A);}
.ni2{background:linear-gradient(135deg,#1A2E42,#2d3a1a);}
.ni3{background:linear-gradient(135deg,#2d1a0e,#1A2E42);}
.news-tag{position:absolute;top:12px;left:12px;background:var(--gold);color:var(--navy);padding:3px 9px;border-radius:2px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;font-weight:600;}
.news-body{padding:22px;}
.news-cat{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
.news-title{font-family:'Fraunces',serif;font-size:18px;color:var(--navy);line-height:1.3;margin-bottom:9px;font-weight:400;}
.news-exc{font-size:12px;color:var(--text-soft);line-height:1.7;margin-bottom:14px;}
.news-rm{font-size:12px;font-weight:600;color:var(--gold);}
.map-inner{display:grid;grid-template-columns:1fr 1.4fr;gap:44px;align-items:center;margin-top:52px;}
.map-details{display:flex;flex-direction:column;gap:22px;}
.map-det{display:flex;gap:14px;align-items:flex-start;}
.map-det-icon{width:42px;height:42px;background:var(--navy);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.map-det-title{font-weight:600;color:var(--navy);font-size:13px;margin-bottom:3px;}
.map-det-text{font-size:12px;color:var(--text-soft);line-height:1.6;white-space:pre-line;}
.btn-dir{background:var(--gold);color:var(--navy);border:none;padding:11px 22px;border-radius:3px;font-size:13px;font-weight:600;margin-top:6px;cursor:pointer;}
.map-frame{border-radius:8px;overflow:hidden;box-shadow:0 8px 36px rgba(13,27,42,.1);}
.map-ph{height:360px;background:var(--navy-light);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;}
.map-ph-icon{font-size:52px;opacity:.2;}
.map-ph-text{color:rgba(255,255,255,.35);font-size:13px;line-height:1.6;}
.map-ph-code{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);opacity:.6;line-height:1.6;}
.contact-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:56px;align-items:start;margin-top:52px;}
.wa-card{background:linear-gradient(135deg,#075E54,#128C7E);border-radius:8px;padding:26px;display:flex;gap:14px;align-items:center;cursor:pointer;transition:transform .3s;margin-bottom:24px;}
.wa-card:hover{transform:translateY(-3px);}
.wa-big{font-size:38px;}
.wa-card-title{font-family:'Fraunces',serif;font-size:18px;color:white;margin-bottom:3px;}
.wa-card-sub{font-size:12px;color:rgba(255,255,255,.65);}
.c-det{display:flex;gap:12px;align-items:flex-start;margin-bottom:18px;}
.c-icon{width:38px;height:38px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.c-title{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:3px;}
.c-text{font-size:13px;color:rgba(255,255,255,.7);}
.c-form{display:flex;flex-direction:column;gap:14px;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.fi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:12px 14px;font-size:13px;color:white;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--gold);}
.fi::placeholder{color:rgba(255,255,255,.2);}
.fs{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:12px 14px;font-size:13px;color:rgba(255,255,255,.7);outline:none;}
.fs option{background:var(--navy);}
.fta{resize:none;min-height:110px;}
.btn-send{background:var(--gold);color:var(--navy);border:none;padding:14px 32px;font-size:14px;font-weight:700;border-radius:3px;display:flex;align-items:center;gap:8px;transition:all .2s;cursor:pointer;}
.btn-send:hover{background:var(--gold-light);}
.btn-send:disabled{background:#aaa;cursor:not-allowed;}
.form-ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);border-radius:8px;padding:20px;text-align:center;color:#2ECC71;}
.footer{background:#060D14;padding:56px 8% 24px;}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr;gap:40px;margin-bottom:48px;padding-bottom:48px;border-bottom:1px solid rgba(255,255,255,.06);}
.ft-desc{font-size:12px;color:rgba(255,255,255,.3);line-height:1.8;max-width:250px;margin:14px 0 20px;}
.ft-social{display:flex;gap:8px;}
.soc-btn{width:34px;height:34px;border:1px solid rgba(255,255,255,.1);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.35);}
.soc-btn:hover{border-color:var(--gold);color:var(--gold);}
.ft-col-title{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.ft-links{list-style:none;display:flex;flex-direction:column;gap:9px;}
.ft-links a{color:rgba(255,255,255,.3);font-size:12px;transition:color .2s;cursor:pointer;}
.ft-links a:hover{color:var(--gold);}
.nl-form{display:flex;border:1px solid rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-top:4px;}
.nl-in{flex:1;background:transparent;border:none;padding:10px 12px;font-size:12px;color:white;outline:none;}
.nl-in::placeholder{color:rgba(255,255,255,.2);}
.nl-btn{background:var(--gold);border:none;color:var(--navy);padding:10px 14px;font-size:12px;font-weight:700;cursor:pointer;}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.ft-copy{font-size:11px;color:rgba(255,255,255,.2);}
.ft-legal{display:flex;gap:16px;}
.ft-legal a{font-size:10px;color:rgba(255,255,255,.2);font-family:'DM Mono',monospace;cursor:pointer;}
.ft-legal a:hover{color:var(--gold);}
.wa-float{position:fixed;bottom:26px;right:26px;z-index:700;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.wa-tip{background:var(--navy);color:white;padding:9px 14px;border-radius:4px;font-size:12px;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);}
.wa-tip strong{color:var(--gold);display:block;font-size:10px;font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:1px;}
.wa-btn{width:58px;height:58px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(37,211,102,.4);position:relative;transition:transform .2s;}
.wa-btn:hover{transform:scale(1.08);}
.wa-btn::before,.wa-btn::after{content:'';position:absolute;border-radius:50%;border:2px solid rgba(37,211,102,.3);}
.wa-btn::before{inset:-6px;animation:wp 2s ease infinite;}
.wa-btn::after{inset:-12px;border-width:1px;border-color:rgba(37,211,102,.15);animation:wp 2s .4s ease infinite;}
@keyframes wp{0%{transform:scale(1);opacity:.5;}100%{transform:scale(1.4);opacity:0;}}
.notifs{position:fixed;top:84px;right:18px;z-index:600;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif{background:white;border-radius:4px;padding:12px 16px;box-shadow:0 8px 28px rgba(0,0,0,.1);border-left:3px solid var(--success);min-width:260px;pointer-events:all;animation:ni .3s ease;}
.notif.err{border-left-color:var(--error);}
.notif-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.notif-msg{font-size:11px;color:var(--text-soft);}
@keyframes ni{from{opacity:0;transform:translateX(28px);}to{opacity:1;transform:translateX(0);}}
.about-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:48px;}
.about-block{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:28px 24px;}
.about-icon{font-size:28px;margin-bottom:12px;}
.about-title{font-family:'Fraunces',serif;font-size:16px;color:white;margin-bottom:8px;}
.about-text{font-size:13px;color:rgba(255,255,255,.45);line-height:1.7;}
@media(max-width:900px){
  .nav-links{display:none;}
  .hero-title{font-size:36px;}
  .srv-grid,.faq-grid,.map-inner,.contact-grid,.footer-top,.about-grid{grid-template-columns:1fr;}
  .stats-row,.f-row{grid-template-columns:1fr 1fr;}
  .gal-grid,.news-grid{grid-template-columns:1fr 1fr;}
  .gal-item:nth-child(1){grid-column:span 1;grid-row:span 1;}
  .gal-item:nth-child(5){grid-column:span 1;}
  .t-card{min-width:290px;}
}

  {img:'ni2',emoji:'🔍',date:'MAR 2026',cat:'SEO Tips',title:'The 2026 Guide to SEO in Portugal',exc:'Google latest algorithm updates have shifted Portugal SEO landscape. Here is what local businesses need to know.'},

var state={
  page:'home',lang:'en',
  slideIdx:0,tIdx:0,
  faqOpen:null,
  galleryFilter:'All',lbIdx:null,
  vidPlaying:false,
  cookie:true,waShow:false,
  notifs:[],
  formDone:false,formLoading:false,
  form:{name:'',email:'',phone:'',service:'',message:''},
  nlDone:false,nlEmail:'',
  scrolled:false,
};
function setState(patch){Object.assign(state,patch);render();}
function addNotif(title,msg,type){
  var id=Date.now();
  state.notifs.push({id:id,title:title,msg:msg,type:type||'ok'});
  render();
  setTimeout(function(){state.notifs=state.notifs.filter(function(n){return n.id!==id;});render();},4500);
}
var waMsg=encodeURIComponent("Hi Fado Digital, I'm interested in your services.");
function openWA(){window.open('https://wa.me/351XXXXXXXXX?text='+waMsg,'_blank');}
function goPage(p){setState({page:p,lbIdx:null,vidPlaying:false,faqOpen:null});window.scrollTo(0,0);}
function removeNotif(id){state.notifs=state.notifs.filter(function(n){return n.id!==id;});render();}
function nlSubmit(){
  var el=document.getElementById('nlIn');
  if(!el)return;
  if(!el.value||!/\S+@\S+\.\S+/.test(el.value)){addNotif('Invalid email','Please enter a valid email address.','err');return;}
  setState({nlDone:true});
  addNotif('Subscribed!','You will receive our monthly newsletter.','ok');
}
function sendForm(){
  var n=document.getElementById('fn');
  var e=document.getElementById('fe');
  var m=document.getElementById('fm');
  if(!n||!e||!m)return;
  if(!n.value||!e.value||!m.value){addNotif('Please fill all fields','Name, email and message are required.','err');return;}
  setState({formLoading:true});
  setTimeout(function(){setState({formLoading:false,formDone:true});addNotif('Message sent!','We will get back to you within 24 hours.','ok');},1500);
}
function bindEvents(){
  var btn=document.getElementById('sendBtn');
  if(btn)btn.onclick=sendForm;
}

setInterval(function(){

  setState({tIdx:next});
},4200);
setTimeout(function(){setState({waShow:true});},3000);
window.addEventListener('scroll',function(){setState({scrolled:window.scrollY>60});});
function render(){
  var app=document.getElementById('app');
  if(!app)return;
  app.innerHTML=buildCookie()+buildNav()+buildPage()+buildWA()+buildNotifs();

}
function buildCookie(){
  if(!state.cookie)return '';
  return '<div class="cookie"><div class="cookie-text">We use cookies to enhance your experience. By continuing you agree to our Cookie Policy. GDPR compliant.</div><div class="cookie-btns"><button class="btn-accept" onclick="setState({cookie:false})">Accept All</button><button class="btn-decline" onclick="setState({cookie:false})">Essential Only</button></div></div>';
}
function buildNav(){
  var pages=[['home','Home'],['services','Services'],['work','Work'],['about','About'],['news','News'],['contact','Contact']];

    +'<div class="nav-logo" onclick="goPage(\'home\')">'
